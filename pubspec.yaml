name: smart_chef_ai_assistant
description: "A hands-free cooking assistant app"
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  google_fonts: ^6.2.1
  provider: ^6.1.5
  auto_route: ^10.2.0
  equatable: ^2.0.5
  flutter_bloc: ^9.1.1
  bloc_concurrency: ^0.3.0
  shared_preferences: ^2.5.4
  drift: ^2.14.1
  sqlite3_flutter_libs: ^0.5.18
  path_provider: ^2.1.2
  path: ^1.8.3
  speech_to_text: ^7.3.0
  permission_handler: ^11.3.0
  flutter_dotenv: ^5.1.0
  gigachat_dart: ^0.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.0
  auto_route_generator: ^10.2.5
  drift_dev: ^2.14.1

flutter:
  uses-material-design: true
  assets:
    - .env
